<head>

<style>

/*hdr*/

.green { border-left: 6px solid #4CAF50; }

.filters {
  display: flex;

}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.green { border-left: 6px solid #4CAF50; }
.yellow { border-left: 6px solid #FFC107; }
.orange { border-left: 6px solid #c78d10; }
.red { border-left: 6px solid #F44336; }

.filters {
  display: flex;
  gap: 10px;
  padding: 0 20px;
}

.filters input, .filters select {

  border-radius: 8px;

}

.inventory-list {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

/*bg*/
body {
  margin: 0;
  font-family: "Times New Roman", serif;
  background-color: rgba(100, 175, 75, 0.532);
  background-size: cover;
  animation: fadeInBg 1s ease-in-out forwards;
  opacity: 1;
}
.search { position: fixed; 
    top: 20px; left: 320px; 
    z-index: 100001; 
    background: white; 
    padding: 5px; 
    border-radius: 4px; 
    box-shadow: 0 0 5px rgba(0,0,0,0.3);

 }

/*side*/
#sideMenu {
  position: fixed;
  margin-top:40px;
  top:15px;  
  left: -260px;

/*mnubttn*/

#menuBtn:hover {

    0 0 10px rgba(201, 164, 76, 0.8),

/*tr inv*/
.menu-item {
  width: 100%;

  padding: 12px;
  font-size: 16px;
  cursor: pointer;

}

.menu-item:hover {

}
/*mp*/
#map {
  width: 90%;
  height: 600px;
  margin: 30px auto;
  border-radius: 20px;

}



.telegram-float:hover {
  transform: translateY(-3px);
}

#inventoryList {
  margin-top: 15px;
  max-height: 70vh;
  overflow-y: auto;
}

.inventory-list {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.inventory-card {
  background: white; /* Changed from transparent to white for better visibility */
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  border-top: 5px solid var(--sage);
  transition: transform 0.2s;
}

.inventory-card:hover {
  transform: translateY(-5px);
}

.inventory-card {

</head>

<body>


<button id="menuBtn">☰</button>

<div id="sideMenu">
  <h3>🌿 Menu 🌿</h3>
  <a href="index.html" style="color:white; text-decoration:none; padding:10px; display:block;">🌳 Back to Home Page 🌳</a>
</div>

<h1> 🌱 Treenity: Tree Inventory 🌱</h1>

<section class="summary">
  <div class="card ">🌲 <span id="totalTrees">0</span><br>Total Trees</div>
 
</section>

<input type="text" id="searchInput" placeholder="Search tree type...">
<section class="filters">
  

</section>

<section id="inventoryList" class="inventory-list">
  <!-- Cards inserted by JS -->
</section>

<section id="inventoryList" class="inventory-list">
  </section>

<script>

const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
    sideMenu.classList.toggle("open");
});

const INVENTORY_URL = "https://script.google.com/macros/s/AKfycbzeoWR-nTLWL-iAHKflK3Y6Fov94X7Xo-AvMsdWaWBMvCiHLyS1F7bzIsyR9SZ7ibbb/exec";

let allTrees = [];

async function fetchInventory() {
    try {
        const response = await fetch(INVENTORY_URL);
        allTrees = await response.json();
        renderTrees(allTrees);
    } catch (err) {
        console.error("Error loading trees:", err);
    }
}


function renderTrees(data) {
    const list = document.getElementById("inventoryList");
    list.innerHTML = "";

    data.forEach(tree => {
        const card = document.createElement("div");
        card.className = "inventory-card";
        card.innerHTML = `
            <div style="color: #1c542b; font-weight: bold; border-bottom: 1px solid #ddd; margin-bottom: 5px;">
                ${(tree.type || "Unknown").toUpperCase()}
            </div>
            <b>Loc:</b> ${tree.lat}, ${tree.lng}
        `;
        list.appendChild(card);
    });

    document.getElementById("totalTrees").textContent = data.length;
}

function filterData() {
    const searchTerm = document.getElementById("searchInput").value.toLowerCase();

    const filtered = allTrees.filter(tree => {
      return (tree.type || "").toLowerCase().includes(searchTerm);
    });

    renderTrees(filtered);
}

document.getElementById("searchInput").addEventListener("input", filterData);

fetchInventory();
</script>

</body>
</html>
